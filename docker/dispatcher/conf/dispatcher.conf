# AEM Dispatcher module configuration (local parity; same model used on AWS)
LoadModule dispatcher_module modules/mod_dispatcher.so

<IfModule disp_apache2.c>
    DispatcherConfig    conf/dispatcher/publish-farm.any
    DispatcherLog       logs/dispatcher.log
    DispatcherLogLevel  info
    DispatcherNoServerHeader Off
    DispatcherDeclineRoot    On
    DispatcherUseProcessedURL On
    DispatcherPassError      0
</IfModule>

ServerName dispatcher
# Send everything to the dispatcher handler
<Directory /var/cache/dispatcher>
    Require all granted
</Directory>

DocumentRoot /var/cache/dispatcher

<Location />
    SetHandler dispatcher-handler
</Location>

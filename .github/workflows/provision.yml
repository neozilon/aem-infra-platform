# ONE-CLICK provisioning: infra → wait for AEM → app → configure → verify.
# Chains the individual workflows (workflow_call) so a single dispatch takes an
# environment from nothing to a serving, configured site and prints the URL.
# Environment protection still applies (stage/prod pause for reviewer approval
# at the first job that touches the environment).
name: provision

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, stage, prod]
        default: dev
      harden:
        description: Rotate admin to secrets.AEM_ADMIN_PASSWORD at the end
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: provision-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  infra:
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: ${{ inputs.environment }}
      action: apply
    secrets: inherit

  wait-aem:
    name: wait-aem-${{ inputs.environment }}
    needs: infra
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Wait for AEM readiness on every node (via SSM)
        run: |
          set -euo pipefail
          ids_ports=$(aws ec2 describe-instances \
            --filters "Name=tag:Environment,Values=${{ inputs.environment }}" \
                      "Name=tag:Role,Values=author,publish" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[][InstanceId,Tags[?Key==`Role`]|[0].Value]' \
            --output text)
          echo "$ids_ports"
          while read -r id role; do
            port=$([ "$role" = "author" ] && echo 4502 || echo 4503)
            echo ">>> waiting for $role ($id) on :$port (up to 25 min)"
            cmd_id=$(aws ssm send-command --instance-ids "$id" \
              --document-name AWS-RunShellScript --timeout-seconds 1800 \
              --parameters "commands=[\"for i in \$(seq 1 150); do curl -sf -o /dev/null http://localhost:$port/libs/granite/core/content/login.html && echo READY && exit 0; sleep 10; done; echo TIMEOUT; exit 1\"]" \
              --query 'Command.CommandId' --output text)
            # SSM's waiter times out after ~10 min; poll the invocation instead.
            for _ in $(seq 1 90); do
              st=$(aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$id" \
                --query 'Status' --output text 2>/dev/null || echo Pending)
              case "$st" in
                Success) echo "$role READY"; break;;
                Failed|Cancelled|TimedOut) echo "::error::$role not ready ($st)"; exit 1;;
                *) sleep 20;;
              esac
            done
          done <<< "$ids_ports"

  app:
    needs: wait-aem
    uses: ./.github/workflows/deploy-app.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  configure:
    needs: app
    uses: ./.github/workflows/configure.yml
    with:
      environment: ${{ inputs.environment }}
      harden: ${{ inputs.harden }}
    secrets: inherit

  verify:
    name: verify-${{ inputs.environment }}
    needs: configure
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Smoke-test through the public ALB and publish the URL
        run: |
          set -euo pipefail
          ALB=$(aws elbv2 describe-load-balancers \
            --names "aem-${{ inputs.environment }}-alb" \
            --query 'LoadBalancers[0].DNSName' --output text)
          URL="http://$ALB/content/aemdemo/us/en.html"
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo 000)
            echo "attempt $i: $code"
            [ "$code" = "200" ] && break
            sleep 15
          done
          [ "$code" = "200" ] || { echo "::error::site not serving through the ALB"; exit 1; }
          {
            echo "## ✅ Environment '${{ inputs.environment }}' is live"
            echo ""
            echo "**Site:** $URL"
            echo ""
            echo "All clientlibs and cache verified through ALB → Dispatcher → Publish."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "SITE URL: $URL"

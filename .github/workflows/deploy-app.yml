# Application deployment (O4/O6): build the AEM content packages and install
# them on the environment's Author and Publish nodes.
#   - push to main touching demo-site/** → deploy to DEV automatically
#   - stage/prod → manual dispatch, gated by environment protection rules
# Instances live in private subnets, so installation goes through SSM
# send-command: each node pulls the package from the env binaries bucket
# (its instance role already has read access) and installs it via the CRX
# Package Manager on localhost.
name: deploy-app

on:
  push:
    branches: [main]
    paths: ["demo-site/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, stage, prod]
        default: dev
  workflow_call:
    inputs:
      environment:
        type: string
        default: dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-app-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  TARGET_ENV: ${{ inputs.environment || 'dev' }}

jobs:
  build:
    name: build-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build all package
        run: mvn -B -ntp -f demo-site/aemdemo/pom.xml clean package

      - uses: actions/upload-artifact@v4
        with:
          name: aemdemo-all
          path: demo-site/aemdemo/all/target/aemdemo.all-*.zip
          retention-days: 7

  deploy:
    name: deploy-${{ inputs.environment || 'dev' }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - name: Check AWS wiring
        id: aws
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [ -z "$ROLE_ARN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_ROLE_ARN not set for '$TARGET_ENV' — skipping."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.aws.outputs.configured == 'true'
        with:
          name: aemdemo-all

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.aws.outputs.configured == 'true'
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload package to the env binaries bucket
        if: steps.aws.outputs.configured == 'true'
        env:
          BINARIES_BUCKET_OVERRIDE: ${{ vars.BINARIES_BUCKET }}
        run: |
          # Discover the env's binaries bucket by its tags (names carry random
          # suffixes). vars.BINARIES_BUCKET remains as an optional override.
          if [ -n "$BINARIES_BUCKET_OVERRIDE" ]; then
            BINARIES_BUCKET="$BINARIES_BUCKET_OVERRIDE"
          else
            BINARIES_BUCKET=$(aws resourcegroupstaggingapi get-resources               --resource-type-filters s3:bucket               --tag-filters "Key=Environment,Values=$TARGET_ENV" "Key=Project,Values=aem"               --query 'ResourceTagMappingList[].ResourceARN' --output text               | tr '\t' '\n' | grep -- '-binaries-' | sed 's/.*://' | head -1)
          fi
          if [ -z "$BINARIES_BUCKET" ]; then
            echo "::error::could not discover the binaries bucket for '$TARGET_ENV' (is the env deployed?)"
            exit 1
          fi
          echo "BINARIES_BUCKET=$BINARIES_BUCKET" >> "$GITHUB_ENV"
          PKG=$(ls aemdemo.all-*.zip)
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          aws s3 cp "$PKG" "s3://$BINARIES_BUCKET/packages/$PKG"

      - name: Install on Author and Publish via SSM
        if: steps.aws.outputs.configured == 'true'
        env:
          ADMIN_PASSWORD: ${{ secrets.AEM_ADMIN_PASSWORD || 'admin' }}
        run: |
          set -euo pipefail
          deploy_to() { # $1 = Role tag, $2 = AEM port
            local role="$1" port="$2"
            local ids
            ids=$(aws ec2 describe-instances \
              --filters "Name=tag:Role,Values=$role" \
                        "Name=tag:Environment,Values=$TARGET_ENV" \
                        "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].InstanceId' --output text)
            if [ -z "$ids" ]; then
              echo "::error::no running $role instances tagged Environment=$TARGET_ENV"
              exit 1
            fi
            for id in $ids; do
              echo ">>> installing $PKG on $role $id (port $port)"
              cmd_id=$(aws ssm send-command \
                --instance-ids "$id" \
                --document-name AWS-RunShellScript \
                --parameters "commands=[
                  \"aws s3 cp s3://$BINARIES_BUCKET/packages/$PKG /tmp/$PKG\",
                  \"P='$ADMIN_PASSWORD'; curl -s -u admin:\$P http://localhost:$port/libs/granite/security/currentuser.json | grep -q 'authorizableId\\\":\\\"admin' || P=admin\",
                  \"curl -sf -u admin:\$P -F file=@/tmp/$PKG -F name=aemdemo-all -F force=true -F install=true http://localhost:$port/crx/packmgr/service.jsp\",
                  \"rm -f /tmp/$PKG\"
                ]" \
                --query 'Command.CommandId' --output text)
              aws ssm wait command-executed --command-id "$cmd_id" --instance-id "$id"
              aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$id" \
                --query 'StandardOutputContent' --output text
            done
          }
          deploy_to author 4502
          deploy_to publish 4503

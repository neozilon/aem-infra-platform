# Tier-2 backup (O5 / PLAN §8): scheduled content-package export to the
# versioned S3 backup bucket, executed on the Author via SSM (private subnet).
# Tier 1 (EBS snapshots) is fully in Terraform (DLM policy in modules/backup).
name: backup

on:
  schedule:
    - cron: "30 4 * * *" # daily 04:30 UTC — after the DLM snapshot window
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, stage, prod]
        default: dev

permissions:
  id-token: write
  contents: read

env:
  TARGET_ENV: ${{ inputs.environment || 'dev' }}

jobs:
  backup:
    name: backup-${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - name: Check AWS wiring
        id: aws
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET }}
        run: |
          if [ -z "$ROLE_ARN" ] || [ -z "$BACKUP_BUCKET" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_ROLE_ARN / BACKUP_BUCKET not set for '$TARGET_ENV' — skipping (Phase 8 wiring)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.aws.outputs.configured == 'true'
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Export content package on the Author via SSM
        if: steps.aws.outputs.configured == 'true'
        env:
          BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET }}
          ADMIN_PASSWORD: ${{ secrets.AEM_ADMIN_PASSWORD || 'admin' }}
          REPO_RAW: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}
        run: |
          set -euo pipefail
          AUTHOR_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Role,Values=author" \
                      "Name=tag:Environment,Values=$TARGET_ENV" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -z "$AUTHOR_ID" ]; then
            echo "::error::no running author instance tagged Environment=$TARGET_ENV"
            exit 1
          fi
          cmd_id=$(aws ssm send-command \
            --instance-ids "$AUTHOR_ID" \
            --document-name AWS-RunShellScript \
            --parameters "commands=[
              \"curl -sfL $REPO_RAW/scripts/backup-packages.sh -o /tmp/backup-packages.sh\",
              \"chmod +x /tmp/backup-packages.sh\",
              \"AEM_URL=http://localhost:4502 AEM_CREDS=admin:$ADMIN_PASSWORD BACKUP_BUCKET=$BACKUP_BUCKET OUT_DIR=/tmp/backups /tmp/backup-packages.sh\",
              \"rm -rf /tmp/backup-packages.sh /tmp/backups\"
            ]" \
            --query 'Command.CommandId' --output text)
          aws ssm wait command-executed --command-id "$cmd_id" --instance-id "$AUTHOR_ID"
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$AUTHOR_ID" \
            --query 'StandardOutputContent' --output text